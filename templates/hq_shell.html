<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDS HQ</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="hq-body">

    <header class="hq-spa-header">
        <div class="hq-zone1">
            <div class="hq-zone1-top">
                <nav class="hq-z1-left">
                    <a href="/hq/" class="hq-portal-link hq-current">HQ</a>
                    <span class="hq-pipe">|</span>
                    <a href="/hq/goto-studio" class="hq-portal-link">STUDIO</a>
                    <span class="hq-pipe">|</span>
                    <a href="/hq/logout" class="hq-portal-link">LOGOUT</a>
                </nav>
                <div class="hq-z1-center">
                    <a href="/hq/" class="hq-logo-link">STUDS</a>
                    <div class="hq-confidential-sub">(CONFIDENTIAL)</div>
                </div>
                <nav class="hq-z1-right-nav">
                    <a href="/hq/upload" class="hq-portal-link">FILES</a>
                    <span class="hq-pipe">|</span>
                    <button class="hq-portal-link hq-portal-btn" id="refresh-btn" onclick="doRefresh();">REFRESH</button>
                    <span class="hq-pipe">|</span>
                    <a href="/hq/settings" class="hq-portal-link">SETTINGS</a>
                </nav>
            </div>
            <div class="hq-zone1-bottom">
                <div class="hq-timestamp-box">
                    <span class="hq-timestamp-label">UPDATED</span>
                    <span id="last-loaded">{{ data.last_loaded }}</span>
                </div>
            </div>
        </div>
        <hr class="hq-header-rule">
        <div class="hq-zone2">
            <div class="hq-z2-spacer"></div>
            <nav class="hq-section-nav">
                <a href="#" class="hq-section-link" data-section="dashboard" onclick="loadSection('dashboard'); return false;">DASHBOARD</a>
                <span class="hq-pipe">|</span>
                <a href="#" class="hq-section-link" data-section="analytics" onclick="loadSection('analytics'); return false;">ANALYTICS</a>
                <span class="hq-pipe">|</span>
                <a href="#" class="hq-section-link" data-section="database" onclick="loadSection('database'); return false;">DATABASE</a>
                <span class="hq-pipe">|</span>
                <a href="#" class="hq-section-link" data-section="studios" onclick="loadSection('studios'); return false;">STUDIOS</a>
            </nav>
            <div class="hq-z2-spacer"></div>
        </div>
    </header>

    <main id="hq-content" class="hq-main"></main>

    <script>
        var storeDataGlobal = {{ db_stores | tojson }};
        var currentSection = null;
        var activeStoreId = null;
        var storeReconData = {};

        function loadSection(section) {
            if (!section) {
                currentSection = null;
                document.getElementById('hq-content').innerHTML = '';
                document.querySelectorAll('.hq-section-link').forEach(function(l) {
                    l.classList.remove('active');
                });
                history.pushState({}, '', '/hq/');
                return;
            }
            currentSection = section;
            document.querySelectorAll('.hq-section-link').forEach(function(l) {
                if (l.dataset.section === section) {
                    l.classList.add('active');
                } else {
                    l.classList.remove('active');
                }
            });
            fetch('/hq/section/' + section)
                .then(function(r) { return r.text(); })
                .then(function(html) {
                    document.getElementById('hq-content').innerHTML = html;
                    var scripts = document.getElementById('hq-content').querySelectorAll('script');
                    scripts.forEach(function(old) {
                        var s = document.createElement('script');
                        s.textContent = old.textContent;
                        old.parentNode.replaceChild(s, old);
                    });
                    history.pushState({section: section}, '', '/hq/?section=' + section);
                    if (section === 'dashboard') initDashboard();
                    if (section === 'studios') initStudios();
                });
        }

        function doRefresh() {
            fetch('/hq/refresh', { method: 'POST' })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    document.getElementById('last-loaded').textContent = data.last_loaded;
                    if (currentSection === 'dashboard') loadSection('dashboard');
                })
                .catch(function(err) { alert('Refresh failed: ' + err); });
        }

        // Dashboard JS
        function initDashboard() {
            var modal = document.getElementById('email-modal');
            if (modal) {
                modal.addEventListener('click', function(e) {
                    if (e.target === this) closeEmailModal();
                });
            }
        }

        function toggleDetail(storeId) {
            var row = document.getElementById('detail-' + storeId);
            var arrow = document.getElementById('arrow-' + storeId);
            if (row.style.display === 'none') {
                row.style.display = 'table-row';
                arrow.innerHTML = '&#9660;';
            } else {
                row.style.display = 'none';
                arrow.innerHTML = '&#9654;';
            }
        }

        function applyFilters() {
            var filterVal = document.getElementById('filter-status').value;
            var sortVal = document.getElementById('sort-by').value;
            var rows = document.querySelectorAll('.store-row');
            var detailRows = document.querySelectorAll('.detail-row');
            var pairs = [];
            rows.forEach(function(row, i) { pairs.push({ row: row, detail: detailRows[i] }); });
            pairs.forEach(function(p) {
                var status = p.row.getAttribute('data-status');
                if (filterVal === 'all' || status === filterVal || (filterVal === 'Incomplete' && status.startsWith('Incomplete'))) {
                    p.row.style.display = '';
                } else { p.row.style.display = 'none'; p.detail.style.display = 'none'; }
            });
            var tbody = document.getElementById('store-tbody');
            var sorted = pairs.slice().sort(function(a, b) {
                if (sortVal === 'store_id') return parseInt(a.row.getAttribute('data-store-id')) - parseInt(b.row.getAttribute('data-store-id'));
                if (sortVal === 'status') {
                    var order = {'Discrepancy Detected':0,'Incomplete (missing file)':1,'Incomplete (unrecognized file format)':1,'Updated':2};
                    return (order[a.row.getAttribute('data-status')]||3) - (order[b.row.getAttribute('data-status')]||3);
                }
                if (sortVal === 'discrepancy_count') return parseInt(b.row.getAttribute('data-discrepancy-count')) - parseInt(a.row.getAttribute('data-discrepancy-count'));
                return 0;
            });
            sorted.forEach(function(p) { tbody.appendChild(p.row); tbody.appendChild(p.detail); });
        }

        function showEmailDraft(storeId) {
            fetch('/hq/email-draft/' + storeId)
                .then(function(r) { return r.json(); })
                .then(function(draft) {
                    document.getElementById('modal-title').textContent = 'Email Draft — ' + draft.store_name;
                    document.getElementById('email-to').value = draft.to;
                    document.getElementById('email-subject').value = draft.subject;
                    document.getElementById('email-body').value = draft.body;
                    document.getElementById('email-modal').style.display = 'flex';
                })
                .catch(function(err) { alert('Failed to generate email draft: ' + err); });
        }
        function closeEmailModal() { document.getElementById('email-modal').style.display = 'none'; }
        function copyEmailDraft() {
            var to = document.getElementById('email-to').value;
            var subject = document.getElementById('email-subject').value;
            var body = document.getElementById('email-body').value;
            navigator.clipboard.writeText('To: ' + to + '\nSubject: ' + subject + '\n\n' + body).then(function() {
                var btn = document.querySelector('.hq-modal-footer .btn-primary');
                btn.textContent = 'Copied!';
                setTimeout(function() { btn.textContent = 'COPY TO CLIPBOARD'; }, 2000);
            });
        }

        // Studios JS
        function initStudios() {
            var el = document.getElementById('studios-search');
            if (el) el.focus();
        }

        function filterStudios() {
            var query = document.getElementById('studios-search').value.toLowerCase().trim();
            var rows = document.querySelectorAll('.hq-studios-row');
            var matches = [];
            rows.forEach(function(row) {
                var sid = row.dataset.sid, name = row.dataset.name;
                if (!query || sid.indexOf(query) !== -1 || name.indexOf(query) !== -1) {
                    row.style.display = '';
                    if (query) matches.push({sid: sid, name: row.children[1].textContent});
                } else { row.style.display = 'none'; }
            });
            var dd = document.getElementById('studios-dropdown');
            if (query && matches.length > 0 && matches.length <= 5) {
                dd.innerHTML = matches.map(function(m) {
                    return '<div class="hq-studios-dd-row" onclick="showStoreProfile(\'' + m.sid + '\')">' +
                        '<span>' + m.name + '</span><span class="hq-muted-text">' + m.sid + '</span></div>';
                }).join('');
                dd.style.display = 'block';
            } else { dd.style.display = 'none'; }
        }

        function getDotClass(s) {
            if (!s) return 'hq-dot-unknown';
            if (s === 'Updated') return 'hq-dot-updated';
            if (s === 'Discrepancy Detected') return 'hq-dot-discrepancy';
            if (s.indexOf('Incomplete') === 0) return 'hq-dot-incomplete';
            return 'hq-dot-unknown';
        }

        function getLocalTime(tz) {
            try { return new Date().toLocaleTimeString('en-US', {hour:'numeric',minute:'2-digit',timeZoneName:'short',timeZone:tz}); }
            catch(e) { return '—'; }
        }

        function showStoreProfile(storeId) {
            var dd = document.getElementById('studios-dropdown');
            if (dd) dd.style.display = 'none';
            activeStoreId = storeId;
            var store = storeDataGlobal.find(function(s) { return s.store_id === storeId; });
            if (!store) return;
            var row = document.querySelector('.hq-studios-row[data-sid="' + storeId + '"]');
            var status = row ? (row.dataset.status || '') : '';
            var dotClass = getDotClass(status);
            var statusText = status || 'No data';
            var rd = (typeof storeReconData !== 'undefined' && storeReconData[storeId]) ? storeReconData[storeId] : {};

            var leftCol = '<div class="hq-profile-col-left">' +
                '<span class="hq-summary-label">COUNT STATUS</span>' +
                '<div style="margin-top:4px;"><span class="hq-count-dot ' + dotClass + '"></span> ' + statusText + '</div>' +
                '<div style="margin-top:12px;"><span class="hq-summary-label">ASSIGNED SKUS</span><div>' + (rd.active_sku_count != null ? rd.active_sku_count : '—') + '</div></div>' +
                '<div style="margin-top:8px;"><span class="hq-summary-label">DISCREPANCIES</span><div>' + (rd.discrepancy_count != null ? rd.discrepancy_count : '—') + '</div></div>' +
                '<div style="margin-top:8px;"><span class="hq-summary-label">NET DISCREPANCY</span><div>' + (rd.net_discrepancy != null ? rd.net_discrepancy : '—') + '</div></div>' +
                '</div>';

            var rightCol = '<div class="hq-profile-col-right">' +
                '<div><span class="hq-summary-label">TIME</span><div id="profile-time">' + getLocalTime(store.timezone) + '</div></div>' +
                '<div><span class="hq-summary-label">MANAGER</span><div id="pv-manager">' + (store.manager || '—') + '</div></div>' +
                '<div><span class="hq-summary-label">EMAIL</span><div id="pv-email">' + (store.email || '—') + '</div></div>' +
                '<div><span class="hq-summary-label">PHONE</span><div id="pv-phone">' + (store.phone || '—') + '</div></div>' +
                '</div>';

            var prof = document.getElementById('studios-profile');
            prof.style.display = 'block';
            prof.innerHTML =
                '<div class="hq-section">' +
                    '<div class="hq-profile-header">' +
                        '<div class="hq-profile-header-left"><span class="hq-profile-name">' + store.name + '</span><span class="hq-count-dot ' + dotClass + '"></span></div>' +
                        '<button class="hq-btn hq-btn-lavender hq-profile-edit-btn" onclick="enterEditMode(\'' + storeId + '\')">EDIT</button>' +
                    '</div>' +
                    '<div class="hq-profile-2col" id="profile-details">' + leftCol + rightCol + '</div>' +
                    '<div id="profile-auth" style="display:none;"></div>' +
                    '<h3 class="hq-subsection-heading" style="margin-top:24px;">ANALYTICS</h3>' +
                    '<p class="hq-muted-text">Coming soon.</p>' +
                '</div>';

            // Update time every minute
            if (window._profileTimer) clearInterval(window._profileTimer);
            window._profileTimer = setInterval(function() {
                var el = document.getElementById('profile-time');
                if (el) el.textContent = getLocalTime(store.timezone);
                else clearInterval(window._profileTimer);
            }, 60000);
        }

        function enterEditMode(storeId) {
            var store = storeDataGlobal.find(function(s) { return s.store_id === storeId; });
            if (!store) return;
            var row = document.querySelector('.hq-studios-row[data-sid="' + storeId + '"]');
            var status = row ? (row.dataset.status || '') : '';
            var dotClass = getDotClass(status);
            var statusText = status || 'No data';

            var leftCol = '<div class="hq-profile-col-left">' +
                '<span class="hq-summary-label">COUNT STATUS</span>' +
                '<div style="margin-top:4px;"><span class="hq-count-dot ' + dotClass + '"></span> ' + statusText + '</div></div>';

            var rightCol = '<div class="hq-profile-col-right">' +
                '<div><span class="hq-summary-label">TIME</span><div>' + getLocalTime(store.timezone) + '</div></div>' +
                '<div><span class="hq-summary-label">MANAGER</span><div><input type="text" id="edit-manager" class="hq-input hq-inline-input" value="' + (store.manager || '') + '"></div></div>' +
                '<div><span class="hq-summary-label">EMAIL</span><div><input type="text" id="edit-email" class="hq-input hq-inline-input" value="' + (store.email || '') + '"></div></div>' +
                '<div><span class="hq-summary-label">PHONE</span><div><input type="text" id="edit-phone" class="hq-input hq-inline-input" value="' + (store.phone || '') + '"></div></div>' +
                '</div>';

            document.getElementById('profile-details').innerHTML = leftCol + rightCol;
            document.querySelector('.hq-profile-edit-btn').outerHTML =
                '<div class="hq-profile-btn-group">' +
                    '<button class="hq-btn hq-btn-lavender hq-profile-edit-btn" onclick="saveStore(\'' + storeId + '\')">SAVE</button>' +
                    '<button class="hq-btn hq-btn-white hq-profile-edit-btn" onclick="showStoreProfile(\'' + storeId + '\')">CANCEL</button>' +
                    '<span id="save-status" class="hq-muted-text"></span>' +
                '</div>';
            var auth = document.getElementById('profile-auth');
            auth.style.display = 'block';
            auth.innerHTML =
                '<div class="hq-auth-accordion"><h3 class="hq-subsection-heading" style="margin-top:20px;">AUTHENTICATION &#9662;</h3>' +
                '<div class="hq-auth-fields">' +
                '<div><span class="hq-summary-label">USERNAME</span><input type="text" id="edit-username" class="hq-input hq-inline-input" value="' + store.username + '"></div>' +
                '<div><span class="hq-summary-label">NEW PASSWORD</span><input type="password" id="edit-newpw" class="hq-input hq-inline-input" placeholder="New password..."></div>' +
                '<div><span class="hq-summary-label">CONFIRM PASSWORD</span><input type="password" id="edit-confirmpw" class="hq-input hq-inline-input" placeholder="Confirm password..."></div>' +
                '</div></div>';
        }

        function saveStore(storeId) {
            var payload = {
                store_id: storeId,
                manager: document.getElementById('edit-manager').value.trim(),
                email: document.getElementById('edit-email').value.trim(),
                phone: document.getElementById('edit-phone').value.trim(),
                username: document.getElementById('edit-username').value.trim(),
                new_password: document.getElementById('edit-newpw').value,
                confirm_password: document.getElementById('edit-confirmpw').value
            };
            fetch('/hq/studios/update-store', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            })
            .then(function(r) { return r.json(); })
            .then(function(res) {
                var el = document.getElementById('save-status');
                if (res.success) {
                    var store = storeDataGlobal.find(function(s) { return s.store_id === storeId; });
                    if (store) { store.manager = payload.manager; store.email = payload.email; store.phone = payload.phone; if (payload.username) store.username = payload.username; }
                    if (el) { el.textContent = 'Saved.'; el.style.color = '#4a9e5c'; }
                    setTimeout(function() { showStoreProfile(storeId); }, 800);
                } else { if (el) { el.textContent = res.error || 'Error'; el.style.color = '#c0392b'; } }
            })
            .catch(function() { var el = document.getElementById('save-status'); if (el) { el.textContent = 'Network error'; el.style.color = '#c0392b'; } });
        }

        window.addEventListener('popstate', function(e) {
            if (e.state && e.state.section) loadSection(e.state.section);
            else loadSection(null);
        });

        (function() {
            var params = new URLSearchParams(window.location.search);
            var section = params.get('section');
            if (section) loadSection(section);
        })();
    </script>
</body>
</html>
