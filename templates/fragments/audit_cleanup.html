<!-- HQ Audit Trail Cleanup fragment -->

<div class="hq-analytics-subnav">
    <div style="display:flex;align-items:center;width:100%;">
        <span style="font-size:11px;font-weight:400;letter-spacing:0.12em;text-transform:uppercase;color:#999999;">AUDIT TRAIL CLEANUP</span>
    </div>
</div>

<div id="atc-content" style="min-height:200px;"></div>

<script>
(function () {
    'use strict';

    // ── Canonical types (mirror of audit_cleanup.py CANONICAL_TYPES) ─────────
    // Keep in sync with the Python constant of the same name.
    var CANONICAL_TYPES = [
        "Stock Check",
        "Stock Update",
        "Damaged - Contamination",
        "Damaged - Defective/Incompatible Pin",
        "Damaged - Quality Issue (Color/Size/Shape)",
        "Damaged - Bent/Broken",
        "Overselling",
        "Purchase",
        "Damaged - VM Tool/Display",
        "Damaged - Missing/Loose Stone",
        "TO Error",
        "Inter-Studio Transfer (IST) Error",
        "Reallocated Inv – Damaged",
        "Piercing Room Saline",
        "Lost & Found",
        "System Error - Return",
        "Damaged - Burnt",
        "De-Kit",
        "Damaged - Saline",
        "Theft",
        "Kit"
    ];

    // ── Quality-related codes (mirror of audit_cleanup.py QUALITY_RELATED_CODES)
    // Used by _comboDefault() to prefer the quality code over Contamination
    // when computing bulk-review pre-fills for case 4 combo rows.
    var QUALITY_RELATED_CODES = [
        "Damaged - Defective/Incompatible Pin",
        "Damaged - Bent/Broken",
        "Damaged - Quality Issue (Color/Size/Shape)",
        "Damaged - Missing/Loose Stone",
        "Damaged - Burnt"
    ];

    // ── State ─────────────────────────────────────────────────────────────────
    var _state    = 'idle';   // 'idle' | 'processing' | 'reviewing' | 'complete'
    var _result   = null;     // JSON from /process
    var _confirmed  = {};     // {row_index (str): movement_type}  — one-at-a-time mode
    var _flagIdx    = 0;      // index into _result.flagged        — one-at-a-time mode
    var _selType    = null;   // currently selected type in modal  — one-at-a-time mode
    var _ovCheck    = false;  // HQ Override checkbox state        — one-at-a-time mode
    // Bulk-review mode state
    var _reviewMode     = null; // null (selector) | 'modal' | 'bulk'
    var _bulkSelections = {};   // {row_index (str): movement_type}
    var _bulkOvCheck    = false;
    // Violations report
    var _violations     = null; // {username: {missing_reason, custom_reason, multi_reason, rows[]}}
    var _violExpanded   = {};   // {username: bool} — which drilldowns are open

    // ── Utilities ─────────────────────────────────────────────────────────────
    function _esc(s) {
        if (s === null || s === undefined) return '';
        return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function _thousands(n) {
        return Math.abs(n).toLocaleString('en-US');
    }

    // Strips the time component from a datetime string for display only.
    // "2026-03-01 04:03:29" → "2026-03-01".  Returns the original value
    // unchanged if it doesn't contain a space, so plain dates are safe.
    // Never used for the CSV export — raw row.date is written there directly.
    function _fmtDate(d) {
        if (!d) return '—';
        var spaceIdx = String(d).indexOf(' ');
        return spaceIdx > 0 ? d.substring(0, spaceIdx) : d;
    }

    function _signed(n) {
        n = parseInt(n, 10) || 0;
        return (n >= 0 ? '+' : '−') + Math.abs(n).toLocaleString('en-US');
    }

    function _determineMonth(rows) {
        var counts = {};
        (rows || []).forEach(function (row) {
            var d = row.date || '';
            var m = d.match(/(\d{4})-(\d{2})/);
            if (m) {
                var key = m[1] + '-' + m[2];
                counts[key] = (counts[key] || 0) + 1;
            }
        });
        var best = null, bestN = 0;
        Object.keys(counts).forEach(function (k) {
            if (counts[k] > bestN) { bestN = counts[k]; best = k; }
        });
        if (!best) return 'Net Adjustments';
        var parts = best.split('-');
        var MONTHS = ['January','February','March','April','May','June',
                      'July','August','September','October','November','December'];
        return (MONTHS[parseInt(parts[1], 10) - 1] || 'Month') + ' ' + parts[0] + ' Net Adjustments';
    }

    function _computeOverview() {
        var rows = _resultRows || [];
        var agg = {};
        rows.forEach(function (row) {
            var type = row.flagged
                ? (_confirmed[String(row.row_index)] || null)
                : row.type_of_movement;
            if (!type) return;
            var qty = parseInt(row.quantity, 10) || 0;
            if (!agg[type]) agg[type] = { net: 0, count: 0 };
            agg[type].net   += qty;
            agg[type].count += 1;
        });
        var items = Object.keys(agg).map(function (k) {
            return { type: k, net: agg[k].net, count: agg[k].count };
        });
        items.sort(function (a, b) { return Math.abs(b.net) - Math.abs(a.net); });
        return {
            monthLabel: _determineMonth(rows),
            items: items,
            totalNet:   items.reduce(function (s, x) { return s + x.net; }, 0),
            totalCount: items.reduce(function (s, x) { return s + x.count; }, 0),
        };
    }

    // Slim surviving rows (row_index, flagged, type_of_movement, quantity, date)
    // returned by the server alongside the flagged list.  Used by _computeOverview.
    var _resultRows = null;

    // ── Render ────────────────────────────────────────────────────────────────
    function _render() {
        var el = document.getElementById('atc-content');
        if (!el) return;

        var html = _buildInfoCard() + _buildBody();
        // One-at-a-time modal is injected as an overlay; bulk table is inline in _buildBody()
        if (_state === 'reviewing' && _reviewMode === 'modal') html += _buildModal();
        el.innerHTML = html;
    }

    // ── Info card ─────────────────────────────────────────────────────────────
    function _buildInfoCard() {
        return '<div class="hq-section" style="background:#f9f9f9;border-left:3px solid #e8b4f8;margin-top:24px;">' +
            '<h2 class="hq-section-heading" style="margin-bottom:10px;">What this tool does</h2>' +
            '<p style="font-size:13px;color:#444;line-height:1.65;margin:0 0 10px 0;">' +
            'Upload your raw Brightpearl audit trail export and this tool will generate a cleaned version ' +
            'for reporting on studio-level inventory adjustments. The cleaned file excludes:' +
            '</p>' +
            '<ul style=”font-size:13px;color:#444;line-height:1.75;margin:0 0 10px 18px;padding:0;”>' +
            '<li>Shopify sales</li>' +
            '<li>Warehouse activity from Whiplash Ecom and Whiplash Retail</li>' +
            '<li>Warehouse-to-studio inventory transfers (both sides)</li>' +
            '</ul>' +
            '<p style=”font-size:13px;color:#444;line-height:1.65;margin:0;”>' +
            'It also automatically fixes duplicate movement-type entries (for example “TheftTheft” becomes “Theft”), ' +
            'suggests the correct movement type when a studio enters a free-text reason that matches a known keyword, ' +
            'and flags any rows where two different movement types were entered together — ' +
            'so you can confirm the right value before exporting. ' +
            'After processing, you\'ll also see a per-user breakdown of who violated the three Brightpearl ' +
            'adjustment rules so you can follow up directly.' +
            '</p>' +
            '</div>';
    }

    // ── Body (state-dependent) ────────────────────────────────────────────────
    function _buildBody() {
        if (_state === 'idle')       return _buildUploadZone();
        if (_state === 'processing') return _buildProcessing();
        // reviewing or complete
        var base = _buildSummary();
        if (_state === 'complete') return base + _buildOverview() + _buildViolations() + _buildDownload();
        // reviewing — route by mode
        if (_reviewMode === null)   return base + _buildReviewModeSelector();
        if (_reviewMode === 'bulk') return base + _buildBulkTable();
        return base; // 'modal' — overlay appended by _render()
    }

    function _buildUploadZone() {
        return '<div class="hq-section" style="margin-top:0;">' +
            '<h2 class="hq-section-heading">Upload Audit Trail</h2>' +
            '<p class="hq-help-text">Raw Brightpearl export CSV (10 columns, typically ~85,000 rows). ' +
            'Processing runs entirely in your session — nothing is saved to the database.</p>' +
            '<div class="hq-upload-form">' +
            '<input type="file" id="atc-file-input" accept=".csv" ' +
            'onchange="window._atcFileSelect(this)">' +
            '</div>' +
            '</div>';
    }

    function _buildProcessing() {
        return '<div class="hq-section" style="margin-top:0;">' +
            '<p style="font-size:13px;color:#555;letter-spacing:0.03em;">' +
            'Processing… this may take a few seconds for large files.' +
            '</p>' +
            '</div>';
    }

    function _buildSummary() {
        var s = _result ? _result.summary : {};
        var ti  = (s.total_input   || 0).toLocaleString('en-US');
        var fo  = (s.filtered_out  || 0).toLocaleString('en-US');
        var ac  = (s.auto_cleaned  || 0).toLocaleString('en-US');
        var sv  = (s.surviving     || 0).toLocaleString('en-US');
        var fc  = (s.flagged_count || 0).toLocaleString('en-US');

        var flagLabel = _state === 'complete' ? 'Rows Reviewed' : 'Rows Flagged';
        var flagColor = (s.flagged_count || 0) === 0 ? '#2d6930' : '#c05000';

        return '<div style="display:flex;gap:0;border:1px solid #e0e0e0;margin-top:0;margin-bottom:24px;">' +
            _statBox('Total Input',    ti,  '#f7f7f7') +
            _statBox('Filtered Out',   fo,  '#f7f7f7') +
            _statBox('Auto-Cleaned',   ac,  '#f7f7f7') +
            _statBox('Surviving Rows', sv,  '#f7f7f7') +
            _statBoxColor(flagLabel,   fc,  '#f7f7f7', flagColor) +
            '</div>' +
            '<p class="hq-help-text" style="margin-bottom:20px;">' +
            'File: <strong>' + _esc(_result ? _result.original_filename : '') + '</strong>' +
            (_state === 'reviewing' ? ' &mdash; resolve the flagged rows in the modal to enable export.' : '') +
            '</p>';
    }

    function _statBox(label, value, bg) {
        return _statBoxColor(label, value, bg, '#1a1a1a');
    }
    function _statBoxColor(label, value, bg, valueColor) {
        return '<div style="flex:1;padding:18px 20px;border-right:1px solid #e0e0e0;background:' + bg + ';">' +
            '<div style="font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:#999;margin-bottom:6px;">' + label + '</div>' +
            '<div style="font-size:26px;font-weight:500;color:' + valueColor + ';">' + value + '</div>' +
            '</div>';
    }

    function _buildOverview() {
        var ov = _computeOverview();
        var rows = ov.items;

        var tableRows = rows.map(function (item) {
            return '<tr>' +
                '<td style="padding:10px 14px;border-bottom:1px solid #e0e0e0;font-size:13px;">' + _esc(item.type) + '</td>' +
                '<td style="padding:10px 14px;border-bottom:1px solid #e0e0e0;font-size:13px;text-align:right;font-variant-numeric:tabular-nums;">' + _signed(item.net) + '</td>' +
                '<td style="padding:10px 14px;border-bottom:1px solid #e0e0e0;font-size:13px;text-align:right;font-variant-numeric:tabular-nums;">' + _thousands(item.count) + '</td>' +
                '</tr>';
        }).join('');

        var totalRow =
            '<tr style="font-weight:600;">' +
            '<td style="padding:10px 14px;font-size:13px;border-top:1.5px solid #000;">Total</td>' +
            '<td style="padding:10px 14px;font-size:13px;text-align:right;border-top:1.5px solid #000;font-variant-numeric:tabular-nums;">' + _signed(ov.totalNet) + '</td>' +
            '<td style="padding:10px 14px;font-size:13px;text-align:right;border-top:1.5px solid #000;font-variant-numeric:tabular-nums;">' + _thousands(ov.totalCount) + '</td>' +
            '</tr>';

        var copyBtn =
            '<button class="hq-btn hq-btn-white" id="atc-copy-btn" ' +
            'onclick="window._atcCopy()" ' +
            'style="height:28px;padding:0 14px;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;">' +
            'Copy Table' +
            '</button>';

        return '<div class="hq-section" style="margin-bottom:0;">' +
            '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">' +
            '<h2 class="hq-section-heading" style="margin-bottom:0;">' + _esc(ov.monthLabel) + '</h2>' +
            copyBtn +
            '</div>' +
            '<table class="hq-table">' +
            '<thead><tr>' +
            '<th>Adjustment Type</th>' +
            '<th style="text-align:right;">Net Units</th>' +
            '<th style="text-align:right;"># of Adjustments</th>' +
            '</tr></thead>' +
            '<tbody>' + tableRows + totalRow + '</tbody>' +
            '</table>' +
            '</div>';
    }

    function _buildDownload() {
        return '<div style="margin-top:20px;margin-bottom:32px;">' +
            '<button class="hq-btn hq-btn-lavender" onclick="window._atcDownload()" ' +
            'style="height:36px;padding:0 28px;font-size:13px;letter-spacing:0.08em;">' +
            'Download Cleaned CSV' +
            '</button>' +
            '<span style="font-size:12px;color:#999;margin-left:16px;">' +
            _esc(_outputFilename(_result ? _result.original_filename : '')) +
            '</span>' +
            '</div>';
    }

    // ── Adjustment Process Violations report ──────────────────────────────────
    function _buildViolations() {
        var monthLabel = _determineMonth(_resultRows || []).replace(' Net Adjustments', '');

        // Build sorted summary rows from _violations dict
        var rows = [];
        var vdata = _violations || {};
        Object.keys(vdata).forEach(function (user) {
            var v = vdata[user];
            var total = (v.missing_reason || 0) + (v.custom_reason || 0) + (v.multi_reason || 0);
            if (total > 0) {
                rows.push({
                    user:           user,
                    missing_reason: v.missing_reason || 0,
                    custom_reason:  v.custom_reason  || 0,
                    multi_reason:   v.multi_reason   || 0,
                    total:          total,
                    drill:          v.rows || [],
                });
            }
        });
        rows.sort(function (a, b) { return b.total - a.total; });

        var title = 'Adjustment Process Violations' + (monthLabel !== 'Net Adjustments' ? ' — ' + monthLabel : '');

        var copyBtn =
            '<button class="hq-btn hq-btn-white" id="atc-viol-copy-btn" ' +
            'onclick="window._atcCopyViolations()" ' +
            'style="height:28px;padding:0 14px;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;">' +
            'Copy Table' +
            '</button>';

        var headerRow =
            '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">' +
            '<h2 class="hq-section-heading" style="margin-bottom:0;">' + _esc(title) + '</h2>' +
            copyBtn +
            '</div>' +
            '<p style="font-size:12px;color:#777;font-style:italic;margin:0 0 14px 0;">' +
            'Counts per user of the three Brightpearl adjustment rules: ' +
            'Rule 1 — every adjustment must have a reason code; ' +
            'Rule 2 — only use codes from the standard list (no custom typing); ' +
            'Rule 3 — only one reason code per adjustment. ' +
            'Click &#9654; on any row to see the specific adjustments.' +
            '</p>';

        if (rows.length === 0) {
            return '<div class="hq-section" style="margin-bottom:0;">' +
                headerRow +
                '<p style="font-size:13px;color:#2d6930;">' +
                'No violations detected — every adjustment followed the process this month. 🎉' +
                '</p>' +
                '</div>';
        }

        var VIOL_ORDER = { missing_reason: 0, custom_reason: 1, multi_reason: 2 };
        var VIOL_LABEL = {
            missing_reason: 'Missing Reason Code',
            custom_reason:  'Custom Reason Code',
            multi_reason:   'Multiple Reason Codes',
        };

        // Totals row
        var totMissing = rows.reduce(function (s, r) { return s + r.missing_reason; }, 0);
        var totCustom  = rows.reduce(function (s, r) { return s + r.custom_reason;  }, 0);
        var totMulti   = rows.reduce(function (s, r) { return s + r.multi_reason;   }, 0);
        var totAll     = totMissing + totCustom + totMulti;

        var dataRows = rows.map(function (r) {
            var isExpanded = !!_violExpanded[r.user];

            // Caret toggle button — <button> handles Enter/Space natively
            var caret =
                '<button onclick="window._atcToggleViol(' + _esc(JSON.stringify(r.user)) + ')" ' +
                'style="background:none;border:none;cursor:pointer;font-size:11px;padding:0 6px 0 0;' +
                'color:#888;vertical-align:middle;line-height:1;" ' +
                'title="' + (isExpanded ? 'Collapse' : 'Expand') + ' details for ' + _esc(r.user) + '">' +
                (isExpanded ? '&#9660;' : '&#9654;') +
                '</button>';

            var summaryRow =
                '<tr>' +
                '<td style="padding:10px 14px;border-bottom:1px solid #e0e0e0;font-size:13px;">' +
                caret + _esc(r.user) +
                '</td>' +
                '<td style="padding:10px 14px;border-bottom:1px solid #e0e0e0;font-size:13px;text-align:right;font-variant-numeric:tabular-nums;">' + r.missing_reason.toLocaleString('en-US') + '</td>' +
                '<td style="padding:10px 14px;border-bottom:1px solid #e0e0e0;font-size:13px;text-align:right;font-variant-numeric:tabular-nums;">' + r.custom_reason.toLocaleString('en-US')  + '</td>' +
                '<td style="padding:10px 14px;border-bottom:1px solid #e0e0e0;font-size:13px;text-align:right;font-variant-numeric:tabular-nums;">' + r.multi_reason.toLocaleString('en-US')   + '</td>' +
                '<td style="padding:10px 14px;border-bottom:1px solid #e0e0e0;font-size:13px;text-align:right;font-weight:600;font-variant-numeric:tabular-nums;">' + r.total.toLocaleString('en-US') + '</td>' +
                '</tr>';

            if (!isExpanded) return summaryRow;

            // Drilldown — sort by violation type order, then date descending
            var drillRows = (r.drill || []).slice().sort(function (a, b) {
                var od = (VIOL_ORDER[a.violation_type] || 0) - (VIOL_ORDER[b.violation_type] || 0);
                if (od !== 0) return od;
                return (b.date || '').localeCompare(a.date || '');
            });

            var drillTbody = drillRows.map(function (dr) {
                var origCell = dr.original_reason === '(no reason logged)'
                    ? '<em style="color:#aaa;">(no reason logged)</em>'
                    : _esc(dr.original_reason || '—');
                return '<tr>' +
                    '<td style="padding:6px 12px;border-bottom:1px solid #ececec;font-size:12px;white-space:nowrap;">' + _esc(dr.date         || '—') + '</td>' +
                    '<td style="padding:6px 12px;border-bottom:1px solid #ececec;font-size:12px;">'                    + _esc(dr.sku          || '—') + '</td>' +
                    '<td style="padding:6px 12px;border-bottom:1px solid #ececec;font-size:12px;">'                    + _esc(dr.product_name || '—') + '</td>' +
                    '<td style="padding:6px 12px;border-bottom:1px solid #ececec;font-size:12px;text-align:right;">'   + _esc(String(dr.qty   || '—')) + '</td>' +
                    '<td style="padding:6px 12px;border-bottom:1px solid #ececec;font-size:12px;">'                    + _esc(dr.warehouse    || '—') + '</td>' +
                    '<td style="padding:6px 12px;border-bottom:1px solid #ececec;font-size:12px;">'                    + origCell + '</td>' +
                    '<td style="padding:6px 12px;border-bottom:1px solid #ececec;font-size:12px;color:#555;">'         + _esc(VIOL_LABEL[dr.violation_type] || dr.violation_type) + '</td>' +
                    '</tr>';
            }).join('');

            var drillTable =
                '<table style="width:100%;border-collapse:collapse;">' +
                '<thead><tr style="background:#f2f2f2;">' +
                '<th style="padding:6px 12px;font-size:11px;text-align:left;font-weight:600;letter-spacing:0.06em;white-space:nowrap;">Date</th>' +
                '<th style="padding:6px 12px;font-size:11px;text-align:left;font-weight:600;letter-spacing:0.06em;">SKU</th>' +
                '<th style="padding:6px 12px;font-size:11px;text-align:left;font-weight:600;letter-spacing:0.06em;">Product Name</th>' +
                '<th style="padding:6px 12px;font-size:11px;text-align:right;font-weight:600;letter-spacing:0.06em;">Qty</th>' +
                '<th style="padding:6px 12px;font-size:11px;text-align:left;font-weight:600;letter-spacing:0.06em;">Warehouse</th>' +
                '<th style="padding:6px 12px;font-size:11px;text-align:left;font-weight:600;letter-spacing:0.06em;">Original Reason</th>' +
                '<th style="padding:6px 12px;font-size:11px;text-align:left;font-weight:600;letter-spacing:0.06em;">Violation Type</th>' +
                '</tr></thead>' +
                '<tbody>' + drillTbody + '</tbody>' +
                '</table>';

            var drillRow =
                '<tr>' +
                '<td colspan="5" style="padding:0 0 4px 28px;border-bottom:1px solid #e0e0e0;">' +
                '<div style="border-left:3px solid #e8b4f8;background:#fafafa;overflow-x:auto;">' +
                drillTable +
                '</div>' +
                '</td>' +
                '</tr>';

            return summaryRow + drillRow;
        }).join('');

        var totalRow =
            '<tr style="font-weight:600;">' +
            '<td style="padding:10px 14px;font-size:13px;border-top:1.5px solid #000;">Total</td>' +
            '<td style="padding:10px 14px;font-size:13px;text-align:right;border-top:1.5px solid #000;font-variant-numeric:tabular-nums;">' + totMissing.toLocaleString('en-US') + '</td>' +
            '<td style="padding:10px 14px;font-size:13px;text-align:right;border-top:1.5px solid #000;font-variant-numeric:tabular-nums;">' + totCustom.toLocaleString('en-US')  + '</td>' +
            '<td style="padding:10px 14px;font-size:13px;text-align:right;border-top:1.5px solid #000;font-variant-numeric:tabular-nums;">' + totMulti.toLocaleString('en-US')   + '</td>' +
            '<td style="padding:10px 14px;font-size:13px;text-align:right;border-top:1.5px solid #000;font-variant-numeric:tabular-nums;font-weight:600;">' + totAll.toLocaleString('en-US') + '</td>' +
            '</tr>';

        return '<div class="hq-section" style="margin-bottom:0;">' +
            headerRow +
            '<table class="hq-table">' +
            '<thead><tr>' +
            '<th>User</th>' +
            '<th style="text-align:right;">Missing Reason Code</th>' +
            '<th style="text-align:right;">Custom Reason Code</th>' +
            '<th style="text-align:right;">Multiple Reason Codes</th>' +
            '<th style="text-align:right;">Total Violations</th>' +
            '</tr></thead>' +
            '<tbody>' + dataRows + totalRow + '</tbody>' +
            '</table>' +
            '</div>';
    }

    // ── Review-mode selector ──────────────────────────────────────────────────
    function _buildReviewModeSelector() {
        var count = _result ? (_result.flagged || []).length : 0;
        var noun  = count === 1 ? 'row' : 'rows';
        return '<div class="hq-section" style="margin-bottom:24px;">' +
            '<h2 class="hq-section-heading" style="margin-bottom:10px;">' +
            'Resolve ' + count + ' Flagged ' + noun[0].toUpperCase() + noun.slice(1) +
            '</h2>' +
            '<p class="hq-help-text" style="margin-bottom:18px;">' +
            'Choose how you\'d like to work through the flagged rows before exporting.' +
            '</p>' +
            '<div style="display:flex;gap:12px;">' +
            '<button class="hq-btn hq-btn-lavender" ' +
            'onclick="window._atcSetReviewMode(\'modal\')" ' +
            'style="height:40px;padding:0 24px;font-size:13px;">' +
            'One at a Time' +
            '</button>' +
            '<button class="hq-btn hq-btn-white" ' +
            'onclick="window._atcSetReviewMode(\'bulk\')" ' +
            'style="height:40px;padding:0 24px;font-size:13px;">' +
            'Review All at Once' +
            '</button>' +
            '</div>' +
            '</div>';
    }

    // ── Bulk review table ─────────────────────────────────────────────────────
    function _comboDefault(flag_detail) {
        var a = (flag_detail && flag_detail.option_a) ? flag_detail.option_a : '';
        var b = (flag_detail && flag_detail.option_b) ? flag_detail.option_b : '';
        var contam = 'Damaged - Contamination';
        if (a === contam && QUALITY_RELATED_CODES.indexOf(b) !== -1) return b;
        if (b === contam && QUALITY_RELATED_CODES.indexOf(a) !== -1) return a;
        return a; // first-found (existing default)
    }

    function _initBulkSelections() {
        var sels = {};
        (_result ? (_result.flagged || []) : []).forEach(function (row) {
            var def = '';
            if (row.flag_type === 'combo') {
                def = _comboDefault(row.flag_detail);
            } else if (row.flag_type === 'suggestion') {
                def = (row.flag_detail && row.flag_detail.suggested) ? row.flag_detail.suggested : '';
            }
            // no_reason / unknown: leave blank — user must pick
            sels[String(row.row_index)] = def;
        });
        return sels;
    }

    function _buildBulkTable() {
        var flaggedRows = _result ? (_result.flagged || []) : [];
        var unresolved = flaggedRows.filter(function (row) {
            return !_bulkSelections[String(row.row_index)];
        }).length;

        var thead =
            '<thead><tr>' +
            '<th style="width:32px;text-align:center;padding:8px 6px;"></th>' +
            '<th style="padding:8px 12px;white-space:nowrap;">Date</th>' +
            '<th style="padding:8px 12px;">SKU</th>' +
            '<th style="padding:8px 12px;">Product Name</th>' +
            '<th style="padding:8px 12px;text-align:right;">Qty</th>' +
            '<th style="padding:8px 12px;">Warehouse</th>' +
            '<th style="padding:8px 12px;">User</th>' +
            '<th style="padding:8px 12px;min-width:180px;">Original Reason</th>' +
            '<th style="padding:8px 12px;min-width:240px;">Type of Movement</th>' +
            '</tr></thead>';

        var tbodyRows = flaggedRows.map(function (row) {
            var ri  = String(row.row_index);
            var sel = _bulkSelections[ri] || '';

            // Icon marker — 🔀 multi-reason, 💡 suggestion, ⚠️ no_reason/unknown
            var marker =
                row.flag_type === 'combo'      ? '&#x1F500;' :
                row.flag_type === 'suggestion' ? '&#x1F4A1;' :
                                                 '&#x26A0;&#xFE0F;';
            var markerTitle =
                row.flag_type === 'combo'      ? 'Multi-reason row — two movement types detected' :
                row.flag_type === 'suggestion' ? 'Keyword match — suggestion pre-filled' :
                                                 'No movement type — please select';

            // Original reason cell — content varies by flag type
            var fd = row.flag_detail || {};
            var origReasonHtml;
            if (row.flag_type === 'no_reason') {
                origReasonHtml = '<em style="color:#aaa;">(no reason logged)</em>';
            } else {
                var origText = fd.original || '';
                origReasonHtml = origText
                    ? _esc(origText)
                    : '<em style="color:#aaa;">—</em>';
            }

            var opts = CANONICAL_TYPES.map(function (t) {
                return '<option value="' + _esc(t) + '"' + (t === sel ? ' selected' : '') + '>' +
                    _esc(t) + '</option>';
            }).join('');

            var dropdown =
                '<select class="hq-input atc-bulk-sel" ' +
                'data-ridx="' + _esc(ri) + '" ' +
                'style="width:100%;" ' +
                'onchange="window._atcBulkChange(this)">' +
                '<option value="">— select —</option>' +
                opts +
                '</select>';

            var rowBg = sel ? '' : 'background:#fff8f0;';
            return '<tr style="' + rowBg + '">' +
                '<td style="text-align:center;padding:8px 6px;font-size:15px;">' +
                '<span title="' + _esc(markerTitle) + '">' + marker + '</span>' +
                '</td>' +
                '<td style="padding:8px 12px;font-size:12px;white-space:nowrap;">' + _esc(_fmtDate(row.date)) + '</td>' +
                '<td style="padding:8px 12px;font-size:12px;">'                    + _esc(row.sku          || '—') + '</td>' +
                '<td style="padding:8px 12px;font-size:12px;">'                    + _esc(row.product_name || '—') + '</td>' +
                '<td style="padding:8px 12px;font-size:12px;text-align:right;">'   + _esc(row.quantity     || '—') + '</td>' +
                '<td style="padding:8px 12px;font-size:12px;">'                    + _esc(row.warehouse    || '—') + '</td>' +
                '<td style="padding:8px 12px;font-size:12px;white-space:nowrap;">' + _esc(row.username     || 'Unknown') + '</td>' +
                '<td style="padding:8px 12px;font-size:12px;">'                    + origReasonHtml + '</td>' +
                '<td style="padding:8px 12px;">' + dropdown + '</td>' +
                '</tr>';
        }).join('');

        var unresolvedNote = unresolved > 0
            ? '<p class="atc-unresolved-note" style="font-size:12px;color:#c05000;margin:0 0 12px 0;">' +
              '&#x26A0;&#xFE0F; ' + unresolved + ' row' + (unresolved !== 1 ? 's' : '') +
              ' still need a movement type and will be excluded from the export if left blank.' +
              '</p>'
            : '<p class="atc-unresolved-note" style="display:none;font-size:12px;color:#c05000;margin:0 0 12px 0;"></p>';

        var overrideLabel =
            '<label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;margin-bottom:16px;">' +
            '<input type="checkbox" id="atc-bulk-override" ' +
            'onchange="window._atcBulkOverride(this)" ' +
            'style="width:15px;height:15px;cursor:pointer;">' +
            'HQ Override? Check yes to confirm all selections above' +
            '</label>';

        var confirmDisabled = !_bulkOvCheck;
        var confirmBtn =
            '<button class="hq-btn hq-btn-lavender" id="atc-bulk-confirm-btn" ' +
            'onclick="window._atcBulkConfirm()" ' +
            (confirmDisabled ? 'disabled ' : '') +
            'style="height:36px;padding:0 28px;font-size:13px;' +
            (confirmDisabled ? 'opacity:0.4;cursor:not-allowed;' : '') + '">' +
            'Confirm All' +
            '</button>' +
            '<button class="hq-btn" onclick="window._atcSetReviewMode(null)" ' +
            'style="margin-left:10px;">' +
            'Back' +
            '</button>';

        return '<div class="hq-section" style="margin-bottom:24px;">' +
            '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">' +
            '<h2 class="hq-section-heading" style="margin-bottom:0;">All Flagged Rows</h2>' +
            '<span style="font-size:12px;color:#999;">' +
            '&#x1F500; multi-reason &nbsp;&nbsp; &#x1F4A1; suggestion &nbsp;&nbsp; &#x26A0; needs selection' +
            '</span>' +
            '</div>' +
            unresolvedNote +
            '<div style="overflow-x:auto;margin-bottom:20px;">' +
            '<table class="hq-table" style="width:100%;">' +
            thead + '<tbody>' + tbodyRows + '</tbody>' +
            '</table>' +
            '</div>' +
            overrideLabel +
            confirmBtn +
            '</div>';
    }

    function _outputFilename(orig) {
        if (!orig) return '';
        var dot = orig.lastIndexOf('.');
        if (dot < 0) return orig + '_cleaned.csv';
        return orig.substring(0, dot) + '_cleaned' + orig.substring(dot);
    }

    // ── Modal ─────────────────────────────────────────────────────────────────
    function _buildModal() {
        var flaggedRows = _result.flagged;
        var row   = flaggedRows[_flagIdx];
        var total = flaggedRows.length;
        var prog  = 'Reviewing ' + (_flagIdx + 1) + ' of ' + total;

        var detailGrid =
            '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px 20px;' +
            'background:#f9f9f9;border:1px solid #e0e0e0;padding:16px 20px;margin-bottom:20px;">' +
            _detailCell('Date',         _fmtDate(row.date)) +
            _detailCell('SKU',          row.sku          || '—') +
            _detailCell('Product Name', row.product_name || '—') +
            _detailCell('Quantity',     row.quantity     || '—') +
            _detailCell('Warehouse',    row.warehouse    || '—') +
            _detailCell('Username',     row.username     || 'Unknown') +
            '</div>';

        var typeLabel = '<p style="font-size:10px;letter-spacing:0.1em;text-transform:uppercase;' +
            'color:#999;margin:0 0 10px 0;">Type of Movement (select one)</p>';

        var selectionHtml;
        if (row.flag_type === 'combo') {
            var optA = row.flag_detail ? row.flag_detail.option_a : '';
            var optB = row.flag_detail ? row.flag_detail.option_b : '';
            selectionHtml =
                '<div style="display:flex;gap:12px;margin-bottom:20px;">' +
                _typeBtn(optA) + _typeBtn(optB) +
                '</div>';
        } else if (row.flag_type === 'suggestion') {
            // Suggestion variant — keyword matched a canonical type; pre-selected
            var origReason  = (row.flag_detail && row.flag_detail.original)  ? row.flag_detail.original  : '';
            var suggestedType = (row.flag_detail && row.flag_detail.suggested) ? row.flag_detail.suggested : '';
            var helperText =
                '<em style="font-size:12px;color:#888;display:block;margin-bottom:6px;">' +
                'Custom reason entered: <strong>' + _esc(origReason) + '</strong>' +
                '</em>' +
                '<div style="display:inline-flex;align-items:center;gap:6px;' +
                'background:#fff8dc;border:1px solid #e0c040;border-radius:4px;' +
                'padding:5px 10px;margin-bottom:10px;font-size:12px;color:#5a4800;">' +
                '&#128161; Suggested: <strong>' + _esc(suggestedType) + '</strong>' +
                '</div>';
            var sugOptions = CANONICAL_TYPES.map(function (t) {
                return '<option value="' + _esc(t) + '"' + (t === suggestedType ? ' selected' : '') + '>' + _esc(t) + '</option>';
            }).join('');
            selectionHtml = helperText +
                '<div style="margin-bottom:20px;">' +
                '<select id="atc-modal-dropdown" class="hq-input" ' +
                'style="width:100%;max-width:400px;" ' +
                'onchange="window._atcDropdownChange(this)">' +
                '<option value="">-- Select movement type --</option>' +
                sugOptions +
                '</select>' +
                '</div>';
        } else {
            // Dropdown variant (no_reason or unknown)
            var helperText = '';
            if (row.flag_type === 'no_reason') {
                helperText = '<em style="font-size:12px;color:#888;display:block;margin-bottom:8px;">' +
                    'No reason was logged for this adjustment — please select the correct movement type.' +
                    '</em>';
            } else {
                var orig = (row.flag_detail && row.flag_detail.original) ? row.flag_detail.original : '';
                helperText = '<em style="font-size:12px;color:#888;display:block;margin-bottom:8px;">' +
                    'Could not auto-detect this value: <strong>' + _esc(orig) + '</strong>' +
                    ' — please select the correct movement type.' +
                    '</em>';
            }
            var options = CANONICAL_TYPES.map(function (t) {
                return '<option value="' + _esc(t) + '">' + _esc(t) + '</option>';
            }).join('');
            selectionHtml = helperText +
                '<div style="margin-bottom:20px;">' +
                '<select id="atc-modal-dropdown" class="hq-input" ' +
                'style="width:100%;max-width:400px;" ' +
                'onchange="window._atcDropdownChange(this)">' +
                '<option value="">-- Select movement type --</option>' +
                options +
                '</select>' +
                '</div>';
        }

        var overrideCheck =
            '<label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;margin-bottom:20px;">' +
            '<input type="checkbox" id="atc-modal-override" ' +
            'onchange="window._atcCheckOverride(this)" ' +
            'style="width:15px;height:15px;cursor:pointer;">' +
            'HQ Override? Check yes to confirm' +
            '</label>';

        var confirmDisabled = !(_selType && _ovCheck);
        var confirmBtn =
            '<button class="hq-btn hq-btn-lavender" id="atc-confirm-btn" ' +
            'onclick="window._atcConfirm()" ' +
            (confirmDisabled ? 'disabled ' : '') +
            'style="margin-right:10px;' + (confirmDisabled ? 'opacity:0.4;cursor:not-allowed;' : '') + '">' +
            'Confirm and Next' +
            '</button>' +
            '<button class="hq-btn" onclick="window._atcCancel()">' +
            'Cancel' +
            '</button>';

        return '<div class="hq-modal" id="atc-modal">' +
            '<div class="hq-modal-content" style="width:640px;">' +
            '<div class="hq-modal-header">' +
            '<h2>Review Flagged Row</h2>' +
            '<span style="font-size:12px;color:#999;font-weight:400;">' + _esc(prog) + '</span>' +
            '</div>' +
            '<div class="hq-modal-body">' +
            detailGrid +
            typeLabel +
            selectionHtml +
            overrideCheck +
            '</div>' +
            '<div class="hq-modal-footer">' + confirmBtn + '</div>' +
            '</div>' +
            '</div>';
    }

    function _detailCell(label, value) {
        return '<div>' +
            '<div style="font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:#999;margin-bottom:3px;">' + label + '</div>' +
            '<div style="font-size:13px;color:#1a1a1a;">' + _esc(value) + '</div>' +
            '</div>';
    }

    function _typeBtn(type) {
        var isSelected = (_selType === type);
        // JSON.stringify produces double-quoted strings; _esc converts them to
        // &quot; so they don't break the surrounding double-quoted HTML attribute.
        return '<button class="atc-type-btn hq-btn" ' +
            'data-type="' + _esc(type) + '" ' +
            'onclick="window._atcSelectType(' + _esc(JSON.stringify(type)) + ')" ' +
            'style="flex:1;height:auto;min-height:44px;padding:10px 16px;' +
            'white-space:normal;text-align:left;transition:background 0.1s,border-color 0.1s;' +
            (isSelected
                ? 'background:#FFD700;border-color:#000;border-width:2.5px;font-weight:600;'
                : 'background:#fff;border-color:#ccc;') +
            '">' +
            (isSelected ? '&#10003;&nbsp;' : '') +
            _esc(type) +
            '</button>';
    }

    // ── Pre-select helper for suggestion rows ─────────────────────────────────
    // Sets _selType to the suggested canonical type when the current flagged
    // row has flag_type === 'suggestion', so the user only needs to tick Override.
    // Resets _selType to null for all other flag types.
    function _preselectRow() {
        if (!_result || !_result.flagged) return;
        var row = _result.flagged[_flagIdx];
        if (!row) return;
        if (row.flag_type === 'suggestion' && row.flag_detail && row.flag_detail.suggested) {
            _selType = row.flag_detail.suggested;
        } else {
            _selType = null;
        }
    }

    // ── Event handlers (exported to window for inline onclick) ────────────────

    window._atcFileSelect = function (input) {
        if (!input || !input.files || !input.files[0]) return;
        _state = 'processing';
        _selType = null;
        _ovCheck = false;
        _render();

        var fd = new FormData();
        fd.append('file', input.files[0]);

        fetch('/hq/audit-cleanup/process', { method: 'POST', body: fd })
            .then(function (r) { return r.json(); })
            .then(function (data) {
                if (data.error) {
                    alert('Error: ' + data.error);
                    _state = 'idle';
                    _render();
                    return;
                }
                _result    = data;
                _confirmed = {};
                _flagIdx   = 0;
                _selType   = null;
                _ovCheck   = false;

                // The server returns all surviving rows so we can compute the
                // overview client-side.  Cache them here.
                _resultRows = data.rows || [];

                // Violations dict from the server — keyed by username
                _violations = data.violations || {};

                if (data.flagged && data.flagged.length > 0) {
                    _state = 'reviewing';
                    _reviewMode = null; // show mode selector before entering either flow
                } else {
                    _state = 'complete';
                }
                _render();
            })
            .catch(function (e) {
                alert('Upload failed: ' + e);
                _state = 'idle';
                _render();
            });
    };

    window._atcSelectType = function (type) {
        _selType = type;
        // Update button styles in-place without a full re-render
        document.querySelectorAll('.atc-type-btn').forEach(function (btn) {
            var sel = (btn.dataset.type === type);
            btn.style.background   = sel ? '#FFD700' : '#ffffff';
            btn.style.borderColor  = sel ? '#000'    : '#ccc';
            btn.style.borderWidth  = sel ? '2.5px'   : '1.5px';
            btn.style.fontWeight   = sel ? '600'     : '400';
            // Checkmark prefix: rebuild text content
            btn.textContent = (sel ? '✓ ' : '') + btn.dataset.type;
        });
        _updateConfirmBtn();
    };

    window._atcDropdownChange = function (sel) {
        _selType = sel.value || null;
        _updateConfirmBtn();
    };

    window._atcCheckOverride = function (cb) {
        _ovCheck = cb.checked;
        _updateConfirmBtn();
    };

    function _updateConfirmBtn() {
        var btn = document.getElementById('atc-confirm-btn');
        if (!btn) return;
        var ok = !!(_selType && _ovCheck);
        btn.disabled = !ok;
        btn.style.opacity = ok ? '1' : '0.4';
        btn.style.cursor  = ok ? 'pointer' : 'not-allowed';
    }

    window._atcConfirm = function () {
        if (!_selType || !_ovCheck) return;

        var flaggedRows = _result.flagged;
        var row = flaggedRows[_flagIdx];
        _confirmed[String(row.row_index)] = _selType;

        _flagIdx++;
        _ovCheck = false;

        if (_flagIdx >= flaggedRows.length) {
            // All flagged rows resolved
            _state = 'complete';
            _selType = null;
        } else {
            // Pre-select suggestion for the next row if applicable
            _preselectRow();
        }
        _render();
    };

    window._atcCancel = function () {
        _state          = 'idle';
        _result         = null;
        _resultRows     = null;
        _confirmed      = {};
        _flagIdx        = 0;
        _selType        = null;
        _ovCheck        = false;
        _reviewMode     = null;
        _bulkSelections = {};
        _bulkOvCheck    = false;
        _violations     = null;
        _violExpanded   = {};
        _render();
    };

    window._atcSetReviewMode = function (mode) {
        _reviewMode = mode;
        if (mode === 'bulk') {
            _bulkSelections = _initBulkSelections();
            _bulkOvCheck    = false;
        } else if (mode === 'modal') {
            // Reset one-at-a-time state; pre-select if first row is a suggestion
            _flagIdx = 0;
            _ovCheck = false;
            _preselectRow();
        }
        _render();
    };

    window._atcBulkChange = function (sel) {
        var ri = sel.dataset.ridx;
        _bulkSelections[ri] = sel.value || '';
        // Refresh the unresolved warning without full re-render
        var flaggedRows = _result ? (_result.flagged || []) : [];
        var unresolved = flaggedRows.filter(function (row) {
            return !_bulkSelections[String(row.row_index)];
        }).length;
        var note = document.querySelector('#atc-content .atc-unresolved-note');
        if (note) {
            note.textContent = unresolved > 0
                ? '⚠️ ' + unresolved + ' row' + (unresolved !== 1 ? 's' : '') +
                  ' still need a movement type and will be excluded from the export if left blank.'
                : '';
            note.style.display = unresolved > 0 ? 'block' : 'none';
        }
        // Highlight / un-highlight the row
        var row = sel.closest('tr');
        if (row) row.style.background = sel.value ? '' : '#fff8f0';
    };

    window._atcBulkOverride = function (cb) {
        _bulkOvCheck = cb.checked;
        var btn = document.getElementById('atc-bulk-confirm-btn');
        if (btn) {
            btn.disabled      = !_bulkOvCheck;
            btn.style.opacity = _bulkOvCheck ? '1' : '0.4';
            btn.style.cursor  = _bulkOvCheck ? 'pointer' : 'not-allowed';
        }
    };

    window._atcBulkConfirm = function () {
        if (!_bulkOvCheck) return;
        // Merge bulk selections into _confirmed (only non-empty values)
        Object.keys(_bulkSelections).forEach(function (ri) {
            if (_bulkSelections[ri]) _confirmed[ri] = _bulkSelections[ri];
        });
        _state = 'complete';
        _render();
    };

    window._atcDownload = function () {
        fetch('/hq/audit-cleanup/download', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ confirmed_types: _confirmed })
        })
        .then(function (r) {
            if (!r.ok) {
                return r.json().then(function (d) { throw new Error(d.error || 'Download failed'); });
            }
            return r.blob();
        })
        .then(function (blob) {
            var url  = URL.createObjectURL(blob);
            var link = document.createElement('a');
            link.href = url;
            link.download = _outputFilename(_result ? _result.original_filename : 'audit_trail.csv');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        })
        .catch(function (e) {
            alert('Download error: ' + e.message);
        });
    };

    window._atcCopy = function () {
        var ov   = _computeOverview();
        var lines = [];
        lines.push(ov.monthLabel);
        lines.push(['Adjustment Type', 'Net Units', '# of Adjustments'].join('\t'));
        ov.items.forEach(function (item) {
            lines.push([item.type, _signed(item.net), _thousands(item.count)].join('\t'));
        });
        lines.push(['Total', _signed(ov.totalNet), _thousands(ov.totalCount)].join('\t'));

        var text = lines.join('\n');
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(function () {
                var btn = document.getElementById('atc-copy-btn');
                if (btn) {
                    var orig = btn.textContent;
                    btn.textContent = 'Copied!';
                    setTimeout(function () { btn.textContent = orig; }, 1500);
                }
            }).catch(function () {
                _fallbackCopy(text);
            });
        } else {
            _fallbackCopy(text);
        }
    };

    window._atcToggleViol = function (user) {
        _violExpanded[user] = !_violExpanded[user];
        _render();
    };

    window._atcCopyViolations = function () {
        var monthLabel  = _determineMonth(_resultRows || []).replace(' Net Adjustments', '');
        var title       = 'Adjustment Process Violations' + (monthLabel !== 'Net Adjustments' ? ' — ' + monthLabel : '');
        var vdata       = _violations || {};

        var rows = [];
        Object.keys(vdata).forEach(function (user) {
            var v = vdata[user];
            var total = (v.missing_reason || 0) + (v.custom_reason || 0) + (v.multi_reason || 0);
            if (total > 0) {
                rows.push({
                    user:           user,
                    missing_reason: v.missing_reason || 0,
                    custom_reason:  v.custom_reason  || 0,
                    multi_reason:   v.multi_reason   || 0,
                    total:          total,
                });
            }
        });
        rows.sort(function (a, b) { return b.total - a.total; });

        var lines = [];
        lines.push(title);
        lines.push(['User', 'Missing Reason Code', 'Custom Reason Code', 'Multiple Reason Codes', 'Total Violations'].join('\t'));
        rows.forEach(function (r) {
            lines.push([r.user, r.missing_reason, r.custom_reason, r.multi_reason, r.total].join('\t'));
        });
        var totMissing = rows.reduce(function (s, r) { return s + r.missing_reason; }, 0);
        var totCustom  = rows.reduce(function (s, r) { return s + r.custom_reason;  }, 0);
        var totMulti   = rows.reduce(function (s, r) { return s + r.multi_reason;   }, 0);
        lines.push(['Total', totMissing, totCustom, totMulti, totMissing + totCustom + totMulti].join('\t'));

        var text = lines.join('\n');
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(function () {
                var btn = document.getElementById('atc-viol-copy-btn');
                if (btn) {
                    var orig = btn.textContent;
                    btn.textContent = 'Copied!';
                    setTimeout(function () { btn.textContent = orig; }, 1500);
                }
            }).catch(function () { _fallbackCopy(text); });
        } else {
            _fallbackCopy(text);
        }
    };

    function _fallbackCopy(text) {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity  = '0';
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); } catch (e) { /* ignore */ }
        document.body.removeChild(ta);
    }

    // ── Bootstrap ─────────────────────────────────────────────────────────────
    _render();

})();
</script>
