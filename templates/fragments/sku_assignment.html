<!-- =========================================================================
     HQ SKU Assignment fragment
     Sub-nav (.hq-analytics-subnav) is hoisted into the sticky header by
     loadSection() in hq_shell.html. Everything below it stays in #hq-content.
     ========================================================================= -->

<div class="hq-analytics-subnav">
    <div style="display:flex;align-items:center;width:100%;">
        <div style="flex:1;display:flex;align-items:center;">
            <span style="font-size:11px;font-weight:400;letter-spacing:0.12em;text-transform:uppercase;color:#999999;">SKU ASSIGNMENT</span>
        </div>
        <div style="flex:1;display:flex;justify-content:flex-end;align-items:center;">
            <button class="hq-btn hq-btn-white" onclick="_skuLoad();"
                    style="height:28px;padding:0 14px;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;">
                Refresh Preview
            </button>
        </div>
    </div>
</div>

<div id="sku-assignment-content" style="min-height:200px;"></div>

<script>
(function () {
    'use strict';

    var MONTHS = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];

    /* Parse "MM-DD-YY" → "April 28, 2025" */
    function _parseWeekId(wid) {
        if (!wid) return wid;
        var parts = wid.split('-');
        if (parts.length !== 3) return wid;
        var m = parseInt(parts[0], 10);
        var d = parseInt(parts[1], 10);
        var y = parseInt(parts[2], 10);
        if (isNaN(m) || isNaN(d) || isNaN(y)) return wid;
        var year = y < 100 ? 2000 + y : y;
        return (MONTHS[m - 1] || String(m)) + ' ' + d + ', ' + year;
    }

    /* Parse "MM-DD-YY" → "April 28" */
    function _parseWeekIdShort(wid) {
        if (!wid) return wid;
        var parts = wid.split('-');
        if (parts.length !== 3) return wid;
        var m = parseInt(parts[0], 10);
        var d = parseInt(parts[1], 10);
        if (isNaN(m) || isNaN(d)) return wid;
        return (MONTHS[m - 1] || String(m)) + ' ' + d;
    }

    function _esc(s) {
        if (s === null || s === undefined) return '';
        return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function _fmtNum(n, decimals) {
        if (n === null || n === undefined) return '&mdash;';
        return Number(n).toFixed(decimals);
    }

    function _lastCounted(item) {
        var r = item.reasoning || '';
        if (r.toLowerCase().indexOf('never counted') !== -1) return 'Never';
        var w = item.weeks_since_counted;
        if (w === null || w === undefined) return 'Never';
        w = parseFloat(w);
        if (isNaN(w)) return '&mdash;';
        if (w <= 0.5) return 'This week';
        if (w > 12)   return '12+ wks';
        return Math.round(w) + ' wks';
    }

    function _fmtTriggeredAt(iso) {
        if (!iso) return '&mdash;';
        try {
            return new Date(iso).toLocaleString('en-US', {
                month: 'short', day: 'numeric', year: 'numeric',
                hour: 'numeric', minute: '2-digit', hour12: true
            });
        } catch (e) { return _esc(iso); }
    }

    function _statBox(label, val) {
        return '<div class="hq-analytics-stat">'
            + '<div class="hq-summary-label">' + label + '</div>'
            + '<div class="hq-summary-value" style="font-size:28px;">' + val + '</div>'
            + '</div>';
    }

    /* -------------------------------------------------------------------------
       State
    ------------------------------------------------------------------------- */
    var _preview           = null;
    var _runs              = [];
    var _publishBannerHtml = '';

    /* -------------------------------------------------------------------------
       Entry point
    ------------------------------------------------------------------------- */
    window._skuLoad = function () {
        var el = document.getElementById('sku-assignment-content');
        if (el) el.innerHTML = '<div style="padding:60px;text-align:center;color:#999;font-size:13px;">Loading…</div>';
        _publishBannerHtml = '';

        var pFetch = fetch('/hq/sku-assignment/preview')
            .then(function (r) {
                if (!r.ok) throw new Error('HTTP ' + r.status);
                return r.json();
            });
        var rFetch = fetch('/hq/sku-assignment/runs')
            .then(function (r) {
                if (!r.ok) throw new Error('HTTP ' + r.status);
                return r.json();
            });

        Promise.all([pFetch, rFetch])
            .then(function (results) {
                _preview = results[0];
                _runs    = results[1] || [];
                _render();
            })
            .catch(function () {
                var el = document.getElementById('sku-assignment-content');
                if (!el) return;
                el.innerHTML = '<div style="padding:60px;text-align:center;color:#999;font-size:13px;">'
                    + 'Couldn’t load SKU assignment data. '
                    + '<a href="javascript:void(0)" onclick="_skuLoad()" style="color:#1a1a1a;">Retry</a>'
                    + '</div>';
            });
    };

    /* -------------------------------------------------------------------------
       Render
    ------------------------------------------------------------------------- */
    function _render() {
        var el = document.getElementById('sku-assignment-content');
        if (!el) return;

        var p         = _preview || {};
        var sel       = p.selected || [];
        var stats     = p.stats   || {};
        var wid       = p.target_week_identifier || '';
        var dateStr   = _parseWeekId(wid);
        var dateShort = _parseWeekIdShort(wid);
        var hasData   = sel.length > 0;

        var html = '';

        /* ------------------------------------------------------------------ */
        /* Intro block                                                          */
        /* ------------------------------------------------------------------ */
        html += '<div style="padding:24px 28px 0;">';
        html += '<p style="font-size:14px;color:#1a1a1a;margin:0 0 6px;line-height:1.6;">'
            + 'Below is the proposed assigned SKU list for the upcoming week. '
            + 'Click ‘Save &amp; Publish’ to write the list to the input folder so studios start using it next Monday.'
            + '</p>';
        html += '<p style="font-size:12px;color:#999;margin:0;letter-spacing:0.02em;">'
            + 'Algorithm settings: 60% sales rank weight, 40% time-since-last-count weight. '
            + 'Top 20 SKUs selected. New SKUs delayed 4 weeks before entering rotation.'
            + '</p>';
        html += '</div>';

        /* ------------------------------------------------------------------ */
        /* Publish result banner (shown after a publish action)                */
        /* ------------------------------------------------------------------ */
        if (_publishBannerHtml) {
            html += '<div style="padding:16px 28px 0;">' + _publishBannerHtml + '</div>';
        }

        /* ------------------------------------------------------------------ */
        /* Status / stat banner                                                 */
        /* ------------------------------------------------------------------ */
        if (hasData) {
            /* Headline — mirrors Overview tab pattern */
            html += '<div style="text-align:center;padding:28px 28px 16px;">';
            html += '<div style="font-size:16px;color:#1a1a1a;letter-spacing:0.02em;">'
                + 'Preview for week of <strong>' + _esc(dateStr) + '</strong>'
                + '</div>';
            html += '</div>';

            /* Stat boxes row — mirrors Overview _statBox() / .hq-analytics-stats pattern */
            var nSel      = sel.length;
            var nElig     = stats.eligible_pool_size  != null ? stats.eligible_pool_size  : '—';
            var nSunset   = stats.sunset_excluded     != null ? stats.sunset_excluded     : 0;
            var nInactive = stats.inactive_excluded   != null ? stats.inactive_excluded   : 0;
            var nDelayed  = stats.new_sku_delayed     != null ? stats.new_sku_delayed     : 0;

            html += '<div class="hq-analytics-stats" style="margin:0 28px 8px;">';
            html += _statBox('SELECTED',            nSel);
            html += _statBox('ELIGIBLE',            nElig);
            if (nSunset   > 0) html += _statBox('SUNSET EXCLUDED',      nSunset);
            if (nInactive > 0) html += _statBox('NOT ACTIVE EXCLUDED',  nInactive);
            if (nDelayed  > 0) html += _statBox('NEW SKU DELAY',        nDelayed);
            html += '</div>';

            /* Filename line */
            html += '<div style="margin:0 28px 24px;font-size:12px;color:#999;letter-spacing:0.04em;">'
                + 'Output: SKUList_' + _esc(wid) + '.csv'
                + '</div>';

        } else {
            /* Empty state — mirrors Analytics empty pattern */
            html += '<div style="padding:60px 28px;text-align:center;color:#999;font-size:13px;">'
                + 'No SKUs available for assignment. Possible reasons: Top Sellers file missing '
                + '(upload via Database tab), all SKUs are sunset, or all SKUs are within the new-SKU delay window.'
                + '</div>';
        }

        /* ------------------------------------------------------------------ */
        /* Save & Publish button                                               */
        /* ------------------------------------------------------------------ */
        if (hasData) {
            html += '<div style="padding:0 28px 20px;display:flex;justify-content:flex-end;">';
            html += '<button class="hq-btn hq-btn-lavender" id="sku-publish-btn" onclick="_skuPublish()"'
                + ' style="height:36px;padding:0 24px;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;">'
                + 'Save &amp; Publish for Week of ' + _esc(dateShort)
                + '</button>';
            html += '</div>';
        }

        /* ------------------------------------------------------------------ */
        /* Preview table — mirrors Leaderboard table styling                   */
        /* ------------------------------------------------------------------ */
        if (hasData) {
            html += '<div style="padding:0 28px;">';
            html += '<div style="overflow-x:auto;">';
            html += '<table class="hq-table" id="sku-preview-table"><thead><tr>'
                + '<th style="width:36px;text-align:right;">#</th>'
                + '<th>SKU</th>'
                + '<th>Description</th>'
                + '<th style="text-align:right;width:56px;">Rank</th>'
                + '<th style="text-align:right;width:80px;">Sales Score</th>'
                + '<th style="text-align:left;width:90px;">Last Counted</th>'
                + '<th style="text-align:right;width:80px;">Time Score</th>'
                + '<th style="text-align:right;width:80px;">Composite</th>'
                + '<th style="min-width:220px;">Reasoning</th>'
                + '</tr></thead><tbody>';

            sel.forEach(function (item, i) {
                html += '<tr>'
                    + '<td style="text-align:right;color:#999;">' + (i + 1) + '</td>'
                    + '<td style="font-family:\'Courier New\',monospace;font-size:12px;font-weight:600;">'
                    +     _esc(item.sku) + '</td>'
                    + '<td>' + _esc(item.description || '—') + '</td>'
                    + '<td style="text-align:right;color:#999;">'
                    +     (item.rank != null ? _esc(String(item.rank)) : '—') + '</td>'
                    + '<td style="text-align:right;">' + _fmtNum(item.sales_score, 2) + '</td>'
                    + '<td>' + _lastCounted(item) + '</td>'
                    + '<td style="text-align:right;">' + _fmtNum(item.time_score, 2) + '</td>'
                    + '<td style="text-align:right;font-weight:600;font-size:14px;">'
                    +     _fmtNum(item.composite_score, 2) + '</td>'
                    + '<td style="font-size:12px;color:#555;">' + _esc(item.reasoning || '') + '</td>'
                    + '</tr>';
            });

            html += '</tbody></table></div></div>';
        }

        /* ------------------------------------------------------------------ */
        /* Publish history                                                      */
        /* ------------------------------------------------------------------ */
        html += '<div style="padding:32px 28px 0;">';
        html += '<hr style="border:none;border-top:1px solid #e0e0e0;margin:0 0 28px;">';
        html += '<div class="hq-subsection-heading" style="margin-bottom:14px;">PUBLISH HISTORY</div>';

        var histRows = _runs.slice(0, 10);
        if (!histRows.length) {
            html += '<div style="font-size:13px;color:#999;padding:8px 0 20px;">No publish history yet.</div>';
        } else {
            html += '<div style="overflow-x:auto;">';
            html += '<table class="hq-table"><thead><tr>'
                + '<th style="width:60px;">Run ID</th>'
                + '<th>Triggered At</th>'
                + '<th>Triggered By</th>'
                + '<th>Target Week</th>'
                + '<th style="text-align:right;width:100px;">SKUs Selected</th>'
                + '<th style="text-align:center;width:80px;">Published</th>'
                + '<th>Filename</th>'
                + '</tr></thead><tbody>';

            histRows.forEach(function (row) {
                var pubCell = row.published
                    ? '<span style="color:#3d8c40;font-weight:500;">✓ Yes</span>'
                    : '<span style="color:#999;">No</span>';
                html += '<tr>'
                    + '<td style="color:#999;">' + _esc(String(row.id || '—')) + '</td>'
                    + '<td style="white-space:nowrap;">' + _fmtTriggeredAt(row.triggered_at) + '</td>'
                    + '<td>' + _esc(row.triggered_by_username || '—') + '</td>'
                    + '<td>' + _esc(row.target_week_identifier || '—') + '</td>'
                    + '<td style="text-align:right;">'
                    +     (row.selected_skus_count != null ? row.selected_skus_count : '—') + '</td>'
                    + '<td style="text-align:center;">' + pubCell + '</td>'
                    + '<td style="font-size:12px;color:#555;">'
                    +     _esc(row.published_filename || '—') + '</td>'
                    + '</tr>';
            });

            html += '</tbody></table></div>';
        }
        html += '</div>';

        el.innerHTML = html;
    }

    /* -------------------------------------------------------------------------
       Publish
    ------------------------------------------------------------------------- */
    window._skuPublish = function () {
        var p         = _preview || {};
        var wid       = p.target_week_identifier || '';
        var dateShort = _parseWeekIdShort(wid);
        var filename  = 'SKUList_' + wid + '.csv';

        if (!confirm(
            'Publish this 20-SKU list as ' + filename + '?\n'
            + 'Studios will see this as their assigned list for the week of ' + dateShort + '.'
        )) return;

        var btn = document.getElementById('sku-publish-btn');
        if (btn) btn.disabled = true;

        fetch('/hq/sku-assignment/publish', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({})
        })
        .then(function (r) {
            return r.json().then(function (data) { return { ok: r.ok, data: data }; });
        })
        .then(function (res) {
            if (res.ok && res.data.ok) {
                var d = res.data;
                _publishBannerHtml =
                    '<div style="background:#f0faf3;border:1px solid #4a9e5c;padding:12px 16px;'
                    + 'color:#1e5c2d;font-size:13px;">'
                    + '✓ Published. ' + _esc(d.filename) + ' is now in the input folder. '
                    + 'Run ID: ' + _esc(String(d.run_id)) + '.'
                    + '</div>';
                /* Refetch runs then preview */
                fetch('/hq/sku-assignment/runs')
                    .then(function (r) { return r.json(); })
                    .then(function (rows) {
                        _runs = rows || [];
                        return fetch('/hq/sku-assignment/preview');
                    })
                    .then(function (r) { return r.json(); })
                    .then(function (prev) { _preview = prev; _render(); })
                    .catch(function () { _render(); });
            } else {
                var msg = (res.data && res.data.error) ? res.data.error : 'Unknown error';
                _publishBannerHtml =
                    '<div style="background:#fef2f2;border:1px solid #dc2626;padding:12px 16px;'
                    + 'color:#9b1c1c;font-size:13px;">'
                    + 'Failed to publish: ' + _esc(msg)
                    + '</div>';
                _render();
            }
        })
        .catch(function (err) {
            _publishBannerHtml =
                '<div style="background:#fef2f2;border:1px solid #dc2626;padding:12px 16px;'
                + 'color:#9b1c1c;font-size:13px;">'
                + 'Failed to publish: ' + _esc(String(err))
                + '</div>';
            _render();
        });
    };

    /* -------------------------------------------------------------------------
       Init
    ------------------------------------------------------------------------- */
    _skuLoad();

})();
</script>
