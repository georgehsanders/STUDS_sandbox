<div class="hq-studios">
    <div class="hq-studios-search-wrap">
        <input type="text" id="studios-search" class="hq-studios-search" placeholder="Search by studio name or number..." oninput="filterStudios()" autocomplete="off">
        <div id="studios-dropdown" class="hq-studios-dropdown" style="display:none;"></div>
    </div>

    <div id="studios-profile" class="hq-studios-profile" style="display:none;"></div>

    <div id="studios-list" class="hq-section" style="margin-top:24px;">
        <h2 class="hq-section-heading">All Studios</h2>
        <table class="hq-table">
            <thead>
                <tr>
                    <th style="width:50px;">Count</th>
                    <th>Studio</th>
                    <th>Manager</th>
                    <th>Email</th>
                    <th>Phone</th>
                </tr>
            </thead>
            <tbody id="studios-tbody">
                {% for store in db_stores %}
                {% set status = recon_status.get(store.store_id, '') %}
                <tr class="hq-store-row hq-studios-row" data-sid="{{ store.store_id }}" data-name="{{ store.name|lower }}" data-status="{{ status }}" onclick="showStoreProfile('{{ store.store_id }}')">
                    <td>
                        <span class="hq-count-dot {% if status == 'Updated' %}hq-dot-updated{% elif status == 'Discrepancy Detected' %}hq-dot-discrepancy{% elif status.startswith('Incomplete') %}hq-dot-incomplete{% else %}hq-dot-unknown{% endif %}"></span>
                    </td>
                    <td>{{ store.name }}</td>
                    <td>{{ store.manager or '—' }}</td>
                    <td>{{ store.email or '—' }}</td>
                    <td>{{ store.phone or '—' }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
